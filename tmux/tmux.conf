# Keep tmux portable across Ghostty, Kitty, WezTerm, SSH, WSL, and macOS.
# C-b remains the standard prefix used by upstream documentation and tutorials.

set -g detach-on-destroy off
set -g display-time 1500

# Modern terminal capabilities. Numbered entries make reloads idempotent.
set -s set-clipboard on
set -wg allow-passthrough on
set -s terminal-features[100] 'xterm-ghostty:RGB:clipboard'
set -s terminal-features[101] 'xterm-kitty:RGB:clipboard'
set -s terminal-features[102] 'wezterm:RGB:clipboard'
set -s terminal-features[103] 'xterm-256color:RGB:clipboard'
set -s terminal-features[104] 'alacritty*:RGB:clipboard'

# The Nix-packaged tmux-gruvbox plugin owns the statusline, window formats,
# messages, borders, and clock colors. Keep only behavior and complementary
# copy-mode styling here so reloading this file does not overwrite the theme.
set -g status-interval 5
set -g mode-style 'bg=#458588,fg=#1d2021,bold'

# Bindings intentionally remain stock. C-b ? opens tmux's live key reference,
# so documentation and tutorials always match this machine.

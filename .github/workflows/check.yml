name: Check

on:
   pull_request:
   push:
      branches:
         - main

permissions:
   contents: read

jobs:
   flake:
      strategy:
         fail-fast: false
         matrix:
            runner:
               - ubuntu-24.04
               - macos-15
      runs-on: ${{ matrix.runner }}
      steps:
         - uses: actions/checkout@v5
         - uses: cachix/install-nix-action@v31
           with:
              extra_nix_config: experimental-features = nix-command flakes
         - run: nix flake check
